    <style>
      html,
      body {
        overflow-x: hidden;
        max-width: 100%;
        margin: 0;
      }
      body {
        background-color: #050505;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
      }

      /* ============ ANIMATED GRID BACKGROUND ============ */
      .dark-technical-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(
            to right,
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.03) 1px,
            transparent 1px
          );
        mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 100%
        );
        animation: gridDrift 20s linear infinite;
      }
      @keyframes gridDrift {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 40px 40px;
        }
      }

      /* ============ AMBIENT BLOBS PULSE ============ */
      .ambient-blob {
        animation: blobPulse 8s ease-in-out infinite;
      }
      .ambient-blob-2 {
        animation-delay: -4s;
      }
      @keyframes blobPulse {
        0%,
        100% {
          opacity: 0.6;
          transform: translate(-50%, 0) scale(1);
        }
        50% {
          opacity: 1;
          transform: translate(-50%, 0) scale(1.15);
        }
      }

      /* ============ HEADING SHIMMER ============ */
      .heading-shimmer {
        background: linear-gradient(
          90deg,
          #ffffff 0%,
          #ffffff 40%,
          rgba(255, 255, 255, 0.5) 50%,
          #ffffff 60%,
          #ffffff 100%
        );
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmerSweep 5s ease-in-out infinite;
      }
      @keyframes shimmerSweep {
        0%,
        100% {
          background-position: 200% 0;
        }
        50% {
          background-position: -100% 0;
        }
      }

      /* ============ CARD 3D BASE ============ */
      .card-3d {
        transform-style: preserve-3d;
        backface-visibility: hidden;
        will-change: transform, opacity;
        transition:
          transform 650ms cubic-bezier(0.22, 1, 0.36, 1),
          opacity 550ms ease,
          border-color 300ms ease,
          filter 550ms ease;
      }
      .card-dragging {
        transition: none !important;
        cursor: grabbing !important;
      }

      /* ============ ACTIVE CARD GLOW RING ============ */
      .active-glow {
        position: absolute;
        inset: -2px;
        border-radius: 1rem;
        padding: 2px;
        background: conic-gradient(
          from var(--angle, 0deg),
          rgba(255, 255, 255, 0.4),
          rgba(255, 255, 255, 0.05),
          rgba(180, 200, 255, 0.35),
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.4)
        );
        -webkit-mask:
          linear-gradient(#000 0 0) content-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: rotateAngle 6s linear infinite;
        pointer-events: none;
        opacity: 0.9;
      }
      @property --angle {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }
      @keyframes rotateAngle {
        from {
          --angle: 0deg;
        }
        to {
          --angle: 360deg;
        }
      }

      /* ============ SCANLINE OVERLAY ============ */
      .scanline-overlay {
        position: absolute;
        inset: 0;
        border-radius: 1rem;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 3px
        );
        pointer-events: none;
        opacity: 0.6;
        mix-blend-mode: overlay;
      }
      .scanline-overlay::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 60px;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(255, 255, 255, 0.04),
          transparent
        );
        animation: scanSweep 4s linear infinite;
      }
      @keyframes scanSweep {
        0% {
          top: -60px;
        }
        100% {
          top: 100%;
        }
      }

      /* ============ AVATAR RING + PULSE ============ */
      .avatar-wrap {
        position: relative;
      }
      .avatar-ring {
        position: absolute;
        inset: -4px;
        border-radius: 9999px;
        background: conic-gradient(
          from 0deg,
          rgba(255, 255, 255, 0.5),
          rgba(255, 255, 255, 0.05),
          rgba(180, 200, 255, 0.45),
          rgba(255, 255, 255, 0.05),
          rgba(255, 255, 255, 0.5)
        );
        animation: spinSlow 5s linear infinite;
        -webkit-mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 2px),
          #000 calc(100% - 2px)
        );
        mask: radial-gradient(
          farthest-side,
          transparent calc(100% - 2px),
          #000 calc(100% - 2px)
        );
      }
      @keyframes spinSlow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .avatar-pulse {
        animation: avatarPulse 3s ease-in-out infinite;
      }
      @keyframes avatarPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.15);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(255, 255, 255, 0);
        }
      }

      /* ============ SOCIAL ICON STAGGER ============ */
      .social-icon {
        opacity: 0.4;
        transform: translateY(4px);
        transition:
          transform 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 300ms ease,
          color 200ms ease;
      }
      .card-active:hover .social-icon {
        opacity: 1;
        transform: translateY(0);
      }
      .card-active:hover .social-icon:nth-child(1) {
        transition-delay: 0ms;
      }
      .card-active:hover .social-icon:nth-child(2) {
        transition-delay: 60ms;
      }
      .card-active:hover .social-icon:nth-child(3) {
        transition-delay: 120ms;
      }
      .card-active:hover .social-icon:nth-child(4) {
        transition-delay: 180ms;
      }
      .social-icon:hover {
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.6));
      }

      /* ============ DOTS ============ */
      .dot {
        height: 8px;
        width: 8px;
        border-radius: 9999px;
        background-color: rgba(255, 255, 255, 0.3);
        transition: all 400ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      .dot:hover {
        background-color: rgba(255, 255, 255, 0.5);
      }
      .dot-active {
        width: 24px;
        background-color: #ffffff;
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
      }

      /* ============ PROGRESS BAR ============ */
      .progress-track {
        width: 120px;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
        margin: 0 auto;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.3), #ffffff);
        border-radius: 999px;
        transition: width 600ms cubic-bezier(0.22, 1, 0.36, 1);
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
      }

      /* ============ ENTRANCE ANIMATION ============ */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* ============ REDUCED MOTION ============ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>

    <script>
      // Team Data
      const teamMembers = [
        {
          id: "ayush-kumar",
          title: "Ayush Kumar",
          designation: "Founder / AI Lead",
          description:
            "Architects intelligent systems and leads AI strategy, turning research into scalable real-world products.",
          initials: "AK",
          image: "images/ayush.jpg", // Add image path - leave empty or null to show initials
          socials: {
            linkedin: "https://www.linkedin.com/in/ayush-kumar-ab8a3a2ab/",
            github: "https://github.com/maryu0",
            twitter: "https://x.com/maryu_003",
            instagram: "https://instagram.com/ayush.kumar",
          },
        },
        {
          id: "bibek-gupta",
          title: "Bibek Gupta",
          designation: "Full Stack Engineer",
          description:
            "Builds end-to-end web applications and AI-powered pipelines, bridging backend logic with polished UIs.",
          initials: "BG",
          image: "images/bibek 2.png",
          socials: {
            linkedin: "https://linkedin.com/in/bibekgupta14",
            github: "https://github.com/Bibek-Gupta14",
            twitter: "https://x.com/BibekGupta1406",
            instagram: "https://instagram.com/bebo__o__o",
          },
        },
        {
          id: "pratim-pramanik",
          title: "Pratim Pramanik",
          designation: "ML Engineer",
          description:
            "Designs and trains machine learning models, specialising in NLP and quantum-classical hybrid architectures.",
          initials: "PP",
          image: "images/pratim.jpeg",
          socials: {
            linkedin: "https://www.linkedin.com/in/pratim-pramanik-13592636a",
            github: "https://github.com/PratimPramanik0904",
            twitter: "https://twitter.com/pratim_pramanik",
            instagram: "https://instagram.com/pratim.pramanik",
          },
        },
        {
          id: "aditya-jyoti",
          title: "Aditya Jyoti",
          designation: "Product Lead",
          description:
            "Drives product vision and roadmap, translating user insights into features that ship and stick.",
          initials: "AJ",
          image: "images/aditya.jpg",
          socials: {
            linkedin: "https://www.linkedin.com/in/aditya-jyoti-1b1578285",
            github: "https://github.com/1dity1",
            twitter: "https://x.com/Aditya_ydv__",
            instagram: "https://instagram.com/aditya.jyoti",
          },
        },
      ];

      // Layout config
      let cardWidth = window.innerWidth < 450 ? (window.innerWidth < 360 ? 280 : 310) : 350;
      let cardHeight = window.innerWidth < 450 ? 350 : 375;
      const overlap = 0.52;
      const spreadDeg = 14;
      const depthPx = 70;
      const activeLiftPx = 50;
      const activeScale = 1.05;
      const inactiveScale = 0.93;
      let maxVisible = window.innerWidth < 450 ? 3 : 7;

      let activeIndex = 0;
      let previousActiveIndex = -1;
      let isHovering = false;
      let isClicked = false;

      // Drag state
      let startX = 0;
      let currentX = 0;
      let isDragging = false;
      let dragOffset = 0;

      const container = document.getElementById("card-stack-container");
      const dotsContainer = document.getElementById("dots-container");
      const progressFill = document.getElementById("progress-fill");

      function wrapIndex(n, len) {
        return ((n % len) + len) % len;
      }
      function signedOffset(i, active, len) {
        const raw = i - active;
        const alt = raw > 0 ? raw - len : raw + len;
        return Math.abs(alt) < Math.abs(raw) ? alt : raw;
      }

      // ===== DECRYPT / SCRAMBLE TEXT ANIMATION =====
      const SCRAMBLE_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*<>/";
      function scrambleText(el, finalText, duration = 600) {
        if (!el) return;
        const len = finalText.length;
        const startTime = performance.now();
        function tick(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const revealCount = Math.floor(progress * len);
          let out = "";
          for (let i = 0; i < len; i++) {
            if (i < revealCount || finalText[i] === " ") {
              out += finalText[i];
            } else {
              out +=
                SCRAMBLE_CHARS[
                  Math.floor(Math.random() * SCRAMBLE_CHARS.length)
                ];
            }
          }
          el.textContent = out;
          if (progress < 1) requestAnimationFrame(tick);
          else el.textContent = finalText;
        }
        requestAnimationFrame(tick);
      }

      // ===== RENDER =====
      function render() {
        container.innerHTML = "";
        dotsContainer.innerHTML = "";

        const len = teamMembers.length;
        const maxOffset = Math.max(0, Math.floor(maxVisible / 2));
        const effectiveSpreadDeg = isClicked
          ? spreadDeg * 2.0
          : isHovering
            ? spreadDeg * 1.5
            : spreadDeg;
        const cardSpacing = Math.max(20, Math.round(cardWidth * (1 - overlap)));
        const stepDeg = maxOffset > 0 ? effectiveSpreadDeg / maxOffset : 0;

        teamMembers.forEach((item, i) => {
          const off = signedOffset(i, activeIndex, len);
          const abs = Math.abs(off);
          const visible = abs <= maxOffset;
          if (!visible) return;

          const isActive = off === 0;
          const rotateZ = off * stepDeg;
          const rotateY = off * -8; // 3D tilt for side cards
          const xBase = off * cardSpacing;
          const x = isActive ? xBase + dragOffset : xBase;
          const y = isActive ? -activeLiftPx : 0;
          const scale = isActive ? activeScale : inactiveScale;
          const zIndex = 100 - abs;
          const zTranslate = -abs * depthPx;
          const blurPx = isActive ? 0 : Math.min(abs * 1.5, 4);

          const cardEl = document.createElement("div");
          cardEl.className = `absolute rounded-2xl border bg-cardBg shadow-[0_25px_60px_-15px_rgba(0,0,0,0.8)] p-6 flex flex-col items-center justify-between card-3d ${
            isActive
              ? "cursor-grab active:cursor-grabbing border-white/20 card-active"
              : "cursor-pointer border-white/10"
          }`;
          cardEl.style.width = `${cardWidth}px`;
          cardEl.style.height = `${cardHeight}px`;
          cardEl.style.zIndex = zIndex;
          cardEl.style.opacity = isActive ? "1" : "0.35";
          cardEl.style.filter = `blur(${blurPx}px)`;
          cardEl.style.transform = `translate3d(${x}px, ${y}px, ${zTranslate}px) rotateY(${rotateY}deg) rotateZ(${rotateZ}deg) scale(${scale})`;

          const glowRing = isActive ? `<div class="active-glow"></div>` : "";
          const scanline = isActive
            ? `<div class="scanline-overlay"></div>`
            : "";
          const avatarRing = isActive ? `<div class="avatar-ring"></div>` : "";
          const avatarPulseClass = isActive ? "avatar-pulse" : "";

          // Avatar content - image or initials fallback
          const avatarContent = item.image
            ? `<img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
               <span class="text-white/70 text-lg font-bold tracking-wider font-mono" style="display:none">${item.initials}</span>`
            : `<span class="text-white/70 text-lg font-bold tracking-wider font-mono">${item.initials}</span>`;

          cardEl.innerHTML = `
            ${glowRing}
            ${scanline}
            <div class="w-full h-full flex flex-col items-center justify-between pointer-events-none select-none relative">
              <div class="w-full flex justify-between items-center text-[9px] font-mono tracking-[0.15em] text-white/0 border-b border-white/5 pb-3">
                <span style="color: wheat">MEMBER PROFILE</span>
                <span style="color: #b3d9ff">QBIT / 0${i + 1}</span>
              </div>

              <div class="flex flex-col items-center gap-3 my-auto py-2">
                <div class="avatar-wrap">
                  ${avatarRing}
                  <div class="h-28 w-28 rounded-full overflow-hidden border-2 border-white/10 bg-white/5 flex items-center justify-center shrink-0 shadow-inner relative ${avatarPulseClass}">
                    ${avatarContent}
                  </div>
                </div>

                <div class="text-center">
                  <div class="text-lg font-semibold text-white tracking-tight leading-tight font-sans" ${isActive ? "data-scramble-name" : ""}>${item.title}</div>
                  <div class="mt-0.5 text-[9px] font-bold tracking-[0.18em] text-white/40 uppercase font-mono" ${isActive ? "data-scramble-role" : ""}>
                    ${item.designation}
                  </div>
                </div>
              </div>

              <p class="text-center text-xs text-white/50 leading-relaxed max-w-[270px] line-clamp-3 pb-3 font-sans">
                ${item.description}
              </p>

              <div class="w-full flex items-center justify-center gap-5 border-t border-white/5 pt-3 pointer-events-auto">
                <a href="${item.socials.linkedin}" target="_blank" rel="noreferrer" class="social-icon text-[#3394f5] hover:text-[#3394f5] hover:drop-shadow-[0_0_18px_rgba(85, 167, 250)] transition-all duration-200" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><rect x="2" y="2" width="20" height="20" rx="4" /><path d="M7 10v7M7 7v.01M12 17v-4a2 2 0 0 1 4 0v4M12 10v7" /></svg>
                </a>
                <a href="${item.socials.github}" target="_blank" rel="noreferrer" class="social-icon text-white/70 hover:text-white hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.6)] transition-all duration-200" aria-label="GitHub">
    <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.184 6.839 9.504.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.026 2.747-1.026.546 1.378.202 2.397.1 2.65.64.7 1.028 1.595 1.028 2.688 0 3.847-2.338 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.579.688.481C19.138 20.2 22 16.447 22 12.021 22 6.484 17.523 2 12 2z" /></svg>
  </a>
                <a href="${item.socials.twitter}" target="_blank" rel="noreferrer" class="social-icon text-white/70 hover:text-white hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.6)] transition-all duration-200" aria-label="Twitter X">
    <svg viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" /></svg>
  </a>
              </div>
            </div>
          `;

          if (isActive) {
            cardEl.addEventListener("mousedown", dragStart);
            cardEl.addEventListener("touchstart", dragStart, { passive: true });

            // Prevent drag events from interfering with social link clicks
            cardEl.querySelectorAll(".social-icon").forEach((icon) => {
              icon.addEventListener("mousedown", (e) => e.stopPropagation());
              icon.addEventListener("touchstart", (e) => e.stopPropagation(), {
                passive: true,
              });
            });
          } else {
            cardEl.addEventListener("click", () => {
              isClicked = true;
              activeIndex = i;
              render();
              setTimeout(() => {
                isClicked = false;
                render();
              }, 400);
            });
          }

          container.appendChild(cardEl);

          // Dots
          const dot = document.createElement("button");
          dot.className = `dot ${isActive ? "dot-active" : ""}`;
          dot.setAttribute("aria-label", `Go to ${item.title}`);
          dot.addEventListener("click", () => {
            activeIndex = i;
            render();
          });
          dotsContainer.appendChild(dot);
        });

        // Update progress bar
        const progressPercent = ((activeIndex + 1) / teamMembers.length) * 100;
        progressFill.style.width = `${progressPercent}%`;

        // Trigger scramble animation on active card name/role if active changed
        if (previousActiveIndex !== activeIndex) {
          const nameEl = container.querySelector("[data-scramble-name]");
          const roleEl = container.querySelector("[data-scramble-role]");
          const active = teamMembers[activeIndex];
          if (nameEl) scrambleText(nameEl, active.title, 550);
          if (roleEl) scrambleText(roleEl, active.designation, 450);
          previousActiveIndex = activeIndex;
        }
      }

      // ===== DRAG WITH INERTIA =====
      let lastMoveTime = 0;
      let lastMoveX = 0;
      let velocity = 0;

      function dragStart(e) {
        isDragging = true;
        startX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
        lastMoveX = startX;
        lastMoveTime = performance.now();
        velocity = 0;

        const activeCard = container.querySelector(".card-active");
        if (activeCard) activeCard.classList.add("card-dragging");

        document.addEventListener("mousemove", dragMove);
        document.addEventListener("touchmove", dragMove, { passive: false });
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("touchend", dragEnd);
      }

      function dragMove(e) {
        if (!isDragging) return;
        currentX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
        dragOffset = currentX - startX;

        // Track velocity for inertia
        const now = performance.now();
        const dt = now - lastMoveTime;
        if (dt > 0) {
          velocity = (currentX - lastMoveX) / dt; // px per ms
        }
        lastMoveX = currentX;
        lastMoveTime = now;

        const maxDrag = cardWidth * 0.45;
        if (dragOffset > maxDrag) dragOffset = maxDrag;
        if (dragOffset < -maxDrag) dragOffset = -maxDrag;

        const activeCard = container.querySelector(".card-active");
        if (activeCard) {
          const rotation = dragOffset * 0.05;
          activeCard.style.transform = `translate3d(${dragOffset}px, ${-activeLiftPx}px, 0px) rotateZ(${rotation}deg) scale(${activeScale})`;
        }
      }

      function dragEnd() {
        if (!isDragging) return;
        isDragging = false;

        const activeCard = container.querySelector(".card-active");
        if (activeCard) activeCard.classList.remove("card-dragging");

        // Inertia: factor in velocity
        const inertiaBoost = velocity * 80; // tune multiplier
        const effectiveOffset = dragOffset + inertiaBoost;
        const threshold = cardWidth * 0.22;

        if (effectiveOffset > threshold) {
          activeIndex = wrapIndex(activeIndex - 1, teamMembers.length);
        } else if (effectiveOffset < -threshold) {
          activeIndex = wrapIndex(activeIndex + 1, teamMembers.length);
        }

        dragOffset = 0;
        velocity = 0;

        document.removeEventListener("mousemove", dragMove);
        document.removeEventListener("touchmove", dragMove);
        document.removeEventListener("mouseup", dragEnd);
        document.removeEventListener("touchend", dragEnd);

        render();
      }

      // Keyboard navigation
      container.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") {
          activeIndex = wrapIndex(activeIndex - 1, teamMembers.length);
          render();
        }
        if (e.key === "ArrowRight") {
          activeIndex = wrapIndex(activeIndex + 1, teamMembers.length);
          render();
        }
      });

      container.addEventListener("mouseenter", () => {
        isHovering = true;
        render();
      });
      container.addEventListener("mouseleave", () => {
        isHovering = false;
        render();
      });

      render();

      // Initialize Lucide icons
      lucide.createIcons();

      // Mobile Menu functionality
      const menuToggle = document.getElementById("menu-toggle");
      const mobileMenu = document.getElementById("mobile-menu");
      const menuIcon = menuToggle.querySelector("i");
      const mobileNavLinks = document.querySelectorAll(".mobile-nav-link");

      let isMenuOpen = false;

      function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        if (isMenuOpen) {
          mobileMenu.classList.remove("opacity-0", "pointer-events-none");
          mobileMenu.classList.add("opacity-100");
          menuIcon.setAttribute("data-lucide", "x");
          menuIcon.style.transform = "rotate(90deg)";
          document.body.style.overflow = "hidden"; // Prevent scrolling behind overlay
        } else {
          mobileMenu.classList.remove("opacity-100");
          mobileMenu.classList.add("opacity-0", "pointer-events-none");
          menuIcon.setAttribute("data-lucide", "menu");
          menuIcon.style.transform = "rotate(0deg)";
          document.body.style.overflow = "";
        }
        lucide.createIcons();
      }

      menuToggle.addEventListener("click", toggleMenu);

      mobileNavLinks.forEach(link => {
        link.addEventListener("click", () => {
          if (isMenuOpen) toggleMenu();
        });
      });

      window.addEventListener("resize", () => {
        cardWidth = window.innerWidth < 450 ? (window.innerWidth < 360 ? 280 : 310) : 350;
        cardHeight = window.innerWidth < 450 ? 350 : 375;
        maxVisible = window.innerWidth < 450 ? 3 : 7;
        render();
      });
    </script>
  </body>
</html>
